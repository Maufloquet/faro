# Configuração do analisador estático do Dart.
# Lints base do Flutter + regras estritas alinhadas à qualidade do projeto.
# Ver https://dart.dev/lints para a lista completa.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    # strict-inference e strict-raw-types desativados: geram ruído em
    # MaterialPageRoute, PageRouteBuilder e Future.delayed sem ganho real
    # de tipo. Re-avaliar quando o app estiver mais maduro.

linter:
  rules:
    # Estilo (auto-fixable via `dart fix --apply`)
    prefer_single_quotes: true
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true
    require_trailing_commas: true
    sort_pub_dependencies: true

    # Segurança / correção
    avoid_print: true
    unawaited_futures: true
    use_super_parameters: true
    avoid_dynamic_calls: true

    # Boa prática
    use_key_in_widget_constructors: true
    avoid_redundant_argument_values: true
    prefer_final_locals: true
    prefer_final_in_for_each: true

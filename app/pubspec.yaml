name: projeto_seg
description: "App de alerta de seguranca urbana - assistente de decisao em tempo real"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  app_links: ^6.4.0
  cloud_firestore: ^6.0.4
  cupertino_icons: ^1.0.8
  firebase_analytics: ^12.0.0
  firebase_auth: ^6.1.0
  firebase_core: ^4.1.0
  firebase_crashlytics: ^5.0.0
  firebase_messaging: ^16.0.4
  flutter:
    sdk: flutter
  flutter_local_notifications: ^19.0.0
  flutter_riverpod: ^3.0.0
  geolocator: ^14.0.0
  google_fonts: ^6.2.1
  google_maps_flutter: ^2.10.0
  google_sign_in: ^6.2.1
  home_widget: ^0.7.0
  http: ^1.2.0
  intl: ^0.20.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icon/
    - assets/legal/
  # Nota: assets/dev_occurrences.json (~328KB) é usado apenas em modo
  # dev (USE_DEV_DATA=true). No release vai pro bundle mas é morto.
  # Pra strip em release builds, ver tool/build_release.sh.
  fonts:
    # Fontes de marca — variable fonts (1 arquivo cobre todos os weights).
    # Fraunces (serif editorial) + Inter (UI sans). Total ~1.2 MB no bundle.
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces.ttf
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/faro_icon.png
  adaptive_icon_background: "#2A4A7A"
  adaptive_icon_foreground: assets/icon/faro_icon_fg.png
  remove_alpha_ios: true
  min_sdk_android: 23

flutter_native_splash:
  color: "#F7F3EC"
  image: assets/icon/faro_splash.png
  android_12:
    image: assets/icon/faro_splash.png
    color: "#F7F3EC"
  ios: true
  android: true
  web: false

name: projeto_seg
description: "App de alerta de seguranca urbana - assistente de decisao em tempo real"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.1.0
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.4
  firebase_messaging: ^16.0.4

  # Maps
  google_maps_flutter: ^2.10.0
  geolocator: ^14.0.0

  # State management
  flutter_riverpod: ^3.0.0

  # Utils
  intl: ^0.20.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/faro_icon.png
  adaptive_icon_background: "#2A4A7A"
  adaptive_icon_foreground: assets/icon/faro_icon_fg.png
  remove_alpha_ios: true
  min_sdk_android: 23

name: Deploy Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'infra/firestore.rules'
      - 'infra/firestore.indexes.json'
      - 'firebase.json'
      - '.github/workflows/functions-deploy.yml'

# Cancela deploys anteriores em fila se um push novo chegar — não vale
# rodar deploy do commit N-1 se já tem o N esperando.
concurrency:
  group: functions-deploy
  cancel-in-progress: false

jobs:
  # Job de preflight: decide se o deploy deve rodar. Se os secrets não
  # estiverem configurados, o job termina verde mas com warning e o job
  # de deploy é pulado. Evita poluir a aba Actions com vermelho enquanto
  # o usuário ainda não terminou o setup descrito em docs/firebase_setup.md §12.
  preflight:
    name: Verificar secrets
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "$SA" ] || [ -z "$PID" ]; then
            echo "::warning::Secrets FIREBASE_SERVICE_ACCOUNT e/ou GCP_PROJECT_ID não configurados — deploy pulado. Setup em docs/firebase_setup.md §12."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy Functions + Firestore rules/indexes
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    # Environment "production" — opcional. Se criado em Settings → Environments
    # com required reviewers, força aprovação manual antes do deploy.
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install functions deps
        working-directory: functions
        run: npm ci

      - name: Install firebase-tools
        run: npm install -g firebase-tools

      # Service account JSON em arquivo temporário — GOOGLE_APPLICATION_CREDENTIALS
      # aponta pra ele. firebase-tools autentica via ADC sem precisar de
      # `firebase login:ci` (deprecated).
      - name: Write service account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy Functions
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: firebase deploy --only functions --project "$GCP_PROJECT" --non-interactive --force

      - name: Deploy Firestore rules + indexes
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: firebase deploy --only firestore --project "$GCP_PROJECT" --non-interactive

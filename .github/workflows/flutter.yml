name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'app/**'

jobs:
  analyze:
    name: Analyze + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Tests
        run: flutter test --no-pub

  build-android:
    name: Build APK (debug)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Stub Maps key
        run: |
          echo 'MAPS_API_KEY=PLACEHOLDER_CI' > android/key.properties

      - name: Pub get
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug --dart-define=USE_DEV_DATA=true

  build-ios:
    name: Build iOS (no-codesign)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # Build iOS sem assinatura — valida que o projeto compila, pods
      # resolvem e nada quebrou na camada Swift/Obj-C. Não roda em device,
      # então não precisa de Apple Developer cert nem provisioning.
      - name: Build iOS
        env:
          MAPS_API_KEY: PLACEHOLDER_CI
        run: flutter build ios --no-codesign --debug --dart-define=USE_DEV_DATA=true

name: Flutter CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    paths:
      - 'app/**'

jobs:
  analyze:
    name: Analyze + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Tests (with coverage)
        run: flutter test --no-pub --coverage

      # Codecov é opcional — sem o secret CODECOV_TOKEN configurado, o
      # upload falha silenciosamente. Não bloqueia o CI.
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: app/coverage/lcov.info
          flags: flutter
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: app/coverage/lcov.info
          if-no-files-found: ignore

  build-android:
    name: Build APK (debug)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Cache de Gradle — primeiro build do dia ainda é frio, mas builds
      # subsequentes com mesmo Gradle wrapper + dependências (Kotlin, AGP,
      # androidx) pulam o download pesado.
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('app/android/**/*.gradle*', 'app/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Stub Maps key
        run: |
          echo 'MAPS_API_KEY=PLACEHOLDER_CI' > android/key.properties

      - name: Pub get
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug --dart-define=USE_DEV_DATA=true

  build-ios:
    name: Build iOS (no-codesign)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # Cache de CocoaPods — primeiro build do dia ainda é lento, mas
      # builds subsequentes com mesmo Podfile.lock pulam o pod install pesado.
      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: |
            app/ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('app/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # Build iOS sem assinatura — valida que o projeto compila, pods
      # resolvem e nada quebrou na camada Swift/Obj-C. Não roda em device,
      # então não precisa de Apple Developer cert nem provisioning.
      - name: Build iOS
        env:
          MAPS_API_KEY: PLACEHOLDER_CI
        run: flutter build ios --no-codesign --debug --dart-define=USE_DEV_DATA=true

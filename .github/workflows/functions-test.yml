name: Functions CI

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/functions-test.yml'
  pull_request:
    paths:
      - 'functions/**'

jobs:
  test:
    name: Lint + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test
